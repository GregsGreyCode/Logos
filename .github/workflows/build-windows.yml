name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'          # e.g. v0.4.0 → builds + attaches to GitHub Release
  workflow_dispatch:   # manual trigger from Actions tab (for testing)

permissions:
  contents: write   # required to create/update GitHub Releases

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh   # use PowerShell for all steps

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv
        run: uv venv .venv --python 3.11

      # Add venv to PATH for ALL subsequent steps — this is the correct
      # way to "activate" a venv in GitHub Actions (activation doesn't
      # persist across run: blocks).
      - name: Add venv to PATH
        run: |
          "${{ github.workspace }}\.venv\Scripts" |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # ── 3. App dependencies ──────────────────────────────────────────────
      - name: Install app dependencies
        run: pip install -e ".[messaging,cron,pty,mcp,acp]"

      # ── 4. Desktop build tools ───────────────────────────────────────────
      # logos.ico is pre-built and committed — no SVG/cairo dependency at CI time.
      - name: Install desktop build tools
        run: pip install pyinstaller pystray Pillow

      # ── 5. PyInstaller ───────────────────────────────────────────────────
      - name: Build executable with PyInstaller
        run: pyinstaller launcher\hermes_launcher.spec --noconfirm

      # ── 6. Sign Logos.exe ────────────────────────────────────────────────
      # Azure Trusted Signing gives immediate SmartScreen/SAC reputation.
      # Skipped if secrets are not configured (e.g. forks, draft PRs).
      - name: Sign executable (Azure Trusted Signing)
        if: ${{ secrets.AZURE_CLIENT_ID != '' }}
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id:              ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:              ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret:          ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint:                     ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name:     ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          files-folder:        dist\Logos
          files-folder-filter: exe
          file-digest:         SHA256
          timestamp-rfc3161:   http://timestamp.acs.microsoft.com
          timestamp-digest:    SHA256

      # ── 7. Inno Setup ────────────────────────────────────────────────────
      - name: Build installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer\logos.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── Sign the installer too ───────────────────────────────────────────
      # SAC checks both the inner exe AND the installer that delivered it.
      - name: Sign installer (Azure Trusted Signing)
        if: ${{ secrets.AZURE_CLIENT_ID != '' }}
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id:              ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:              ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret:          ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint:                     ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name:     ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          files-folder:        installer\output
          files-folder-filter: exe
          file-digest:         SHA256
          timestamp-rfc3161:   http://timestamp.acs.microsoft.com
          timestamp-digest:    SHA256

      # ── 8. Compute SHA256 hashes ─────────────────────────────────────────
      # Sidecar .sha256 files give users a machine-readable hash to verify.
      # The combined SHA256SUMS.txt is also uploaded to the Release.
      - name: Compute SHA256 hashes
        id: hashes
        run: |
          $exeFile       = "dist\Logos\Logos.exe"
          $installerFile = (Get-Item "installer\output\LogosSetup-*.exe").FullName
          $installerName = (Get-Item "installer\output\LogosSetup-*.exe").Name

          $exeHash       = (Get-FileHash $exeFile       -Algorithm SHA256).Hash.ToLower()
          $installerHash = (Get-FileHash $installerFile -Algorithm SHA256).Hash.ToLower()

          # Sidecar file next to the installer (conventional format)
          "$installerHash  $installerName" |
            Out-File -FilePath "$installerFile.sha256" -Encoding utf8 -NoNewline

          # Combined checksums file
          "$installerHash  $installerName`n$exeHash  Logos.exe" |
            Out-File -FilePath "installer\output\SHA256SUMS.txt" -Encoding utf8

          # Expose to later steps
          "exe_hash=$exeHash"             >> $env:GITHUB_OUTPUT
          "installer_hash=$installerHash" >> $env:GITHUB_OUTPUT
          "installer_name=$installerName" >> $env:GITHUB_OUTPUT

      # ── 9. Upload artifact ───────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogosSetup-windows
          path: |
            installer\output\LogosSetup-*.exe
            installer\output\LogosSetup-*.exe.sha256
            installer\output\SHA256SUMS.txt
          retention-days: 30

      # ── 10. Attach to GitHub Release (tags only) ─────────────────────────
      # Uploads installer + sidecar hash + SHA256SUMS.txt.
      # The release body includes hashes and verification instructions so
      # users can confirm binary integrity without trusting the download host.
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            installer\output\LogosSetup-*.exe
            installer\output\LogosSetup-*.exe.sha256
            installer\output\SHA256SUMS.txt
          fail_on_unmatched_files: true
          body: |
            ## Logos ${{ github.ref_name }} — Windows Installer

            ### Download
            Download **`${{ steps.hashes.outputs.installer_name }}`** from the assets below.

            ---

            ### SHA256 verification

            Always verify the hash after downloading — it proves the file has not been tampered with in transit.

            | File | SHA256 |
            |------|--------|
            | `${{ steps.hashes.outputs.installer_name }}` | `${{ steps.hashes.outputs.installer_hash }}` |
            | `Logos.exe` (inner binary) | `${{ steps.hashes.outputs.exe_hash }}` |

            **Verify on Windows (PowerShell or certutil):**
            ```powershell
            certutil -hashfile ${{ steps.hashes.outputs.installer_name }} SHA256
            # or:
            (Get-FileHash "${{ steps.hashes.outputs.installer_name }}" -Algorithm SHA256).Hash
            ```

            **Verify on macOS / Linux:**
            ```bash
            sha256sum ${{ steps.hashes.outputs.installer_name }}
            ```

            A machine-readable `SHA256SUMS.txt` and a `.sha256` sidecar file are also attached to this release.

            ---

            ### Why no code signature?

            Logos is an early-stage open-source project. Code signing certificates require identity validation processes that are not yet available to us. We publish full build transparency instead.

            Windows SmartScreen may show a warning on first run — click **"More info" → "Run anyway"** to proceed. This is safe if the SHA256 hash above matches your download.

            ---

            ### Build transparency

            - Built by GitHub Actions — [view this workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Full source → binary pipeline is public and auditable
            - [View source at this tag](${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
