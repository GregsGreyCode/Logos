name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'          # e.g. v0.4.0 → builds + attaches to GitHub Release
  workflow_dispatch:   # manual trigger from Actions tab (for testing)

permissions:
  contents: write   # required to create/update GitHub Releases

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  build:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh   # use PowerShell for all steps

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv
        run: uv venv .venv --python 3.11

      # Add venv to PATH for ALL subsequent steps — this is the correct
      # way to "activate" a venv in GitHub Actions (activation doesn't
      # persist across run: blocks).
      - name: Add venv to PATH
        run: |
          "${{ github.workspace }}\.venv\Scripts" |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # ── 3. App dependencies ──────────────────────────────────────────────
      - name: Install app dependencies
        run: pip install -e ".[messaging,cron,pty,mcp,acp]"

      # ── 4. Desktop build tools ───────────────────────────────────────────
      # logos.ico is pre-built and committed — no SVG/cairo dependency at CI time.
      - name: Install desktop build tools
        run: pip install pyinstaller pystray Pillow

      # ── 5. PyInstaller ───────────────────────────────────────────────────
      - name: Build executable with PyInstaller
        run: pyinstaller launcher\hermes_launcher.spec --noconfirm

      # ── 6. Inno Setup ────────────────────────────────────────────────────
      - name: Build installer with Inno Setup
        run: |
          $version = (Get-Content pyproject.toml | Select-String '^version\s*=\s*"(.+)"').Matches.Groups[1].Value
          Write-Host "Building installer for version $version"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DMyAppVersion=$version installer\logos.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── 7. Compute SHA256 hashes ─────────────────────────────────────────
      # Sidecar .sha256 files give users a machine-readable hash to verify.
      # The combined SHA256SUMS.txt is also uploaded to the Release.
      - name: Compute SHA256 hashes
        id: hashes
        run: |
          $exeFile       = "dist\Logos\Logos.exe"
          $installerFile = (Get-Item "installer\output\LogosSetup-*.exe").FullName
          $installerName = (Get-Item "installer\output\LogosSetup-*.exe").Name

          $exeHash       = (Get-FileHash $exeFile       -Algorithm SHA256).Hash.ToLower()
          $installerHash = (Get-FileHash $installerFile -Algorithm SHA256).Hash.ToLower()

          # Sidecar file next to the installer (conventional format)
          "$installerHash  $installerName" |
            Out-File -FilePath "$installerFile.sha256" -Encoding utf8 -NoNewline

          # Combined checksums file
          "$installerHash  $installerName`n$exeHash  Logos.exe" |
            Out-File -FilePath "installer\output\SHA256SUMS.txt" -Encoding utf8

          # Expose to later steps
          "exe_hash=$exeHash"             >> $env:GITHUB_OUTPUT
          "installer_hash=$installerHash" >> $env:GITHUB_OUTPUT
          "installer_name=$installerName" >> $env:GITHUB_OUTPUT

      # ── 8. Upload artifact ───────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogosSetup-windows
          path: |
            installer\output\LogosSetup-*.exe
            installer\output\LogosSetup-*.exe.sha256
            installer\output\SHA256SUMS.txt
          retention-days: 30

      # ── 9. Attach to GitHub Release (tags only) ──────────────────────────
      # Uploads installer + sidecar hash + SHA256SUMS.txt.
      # The release body includes hashes and verification instructions so
      # users can confirm binary integrity without trusting the download host.
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            installer\output\LogosSetup-*.exe
            installer\output\LogosSetup-*.exe.sha256
            installer\output\SHA256SUMS.txt
          fail_on_unmatched_files: true
          body: |
            ## Logos ${{ github.ref_name }} — Windows Installer

            Download **`${{ steps.hashes.outputs.installer_name }}`** from the assets below.

            ---

            ### ⚠️ Why Windows shows a warning

            Logos is currently unsigned. Code signing certificates is either quite expensive at this time or seems to require an identity validation process that is not yet available to us in the UK.

            We publish full build transparency instead.

            Windows SmartScreen may show **"Windows protected your PC"** on first run — click **"More info" → "Run anyway"**. This is safe once you have verified the SHA256 hash below.

            ---

            ### 🔐 Build transparency

            - Built exclusively by GitHub Actions — no local machines, no manual steps
            - [View this exact workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [View source at this tag](${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }})

            ---

            ### 🔑 SHA256 verification

            | File | SHA256 |
            |------|--------|
            | `${{ steps.hashes.outputs.installer_name }}` | `${{ steps.hashes.outputs.installer_hash }}` |
            | `Logos.exe` (inner binary) | `${{ steps.hashes.outputs.exe_hash }}` |

            **Windows (PowerShell / certutil):**
            ```powershell
            certutil -hashfile ${{ steps.hashes.outputs.installer_name }} SHA256
            ```

            **macOS / Linux:**
            ```bash
            sha256sum ${{ steps.hashes.outputs.installer_name }}
            ```

            `SHA256SUMS.txt` and a `.sha256` sidecar are also attached to this release.

            ---

            ### 📦 Prerequisites

            Logos is self-contained — no Python or runtime install required.

            **MCP servers (optional):** if you want to connect stdio-based MCP servers (anything using `npx` or `node` in its config), you must install [Node.js](https://nodejs.org) (LTS) separately. HTTP/StreamableHTTP MCP servers work without it.

            ---

            ### 🧪 VirusTotal scan

            [Scan `${{ steps.hashes.outputs.installer_name }}` on VirusTotal](https://www.virustotal.com/gui/file/${{ steps.hashes.outputs.installer_hash }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
