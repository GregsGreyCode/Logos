name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'          # e.g. v0.4.0 → builds + attaches to GitHub Release
  workflow_dispatch:   # manual trigger from Actions tab (for testing)

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh   # use PowerShell for all steps

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv
        run: uv venv .venv --python 3.11

      # Add venv to PATH for ALL subsequent steps — this is the correct
      # way to "activate" a venv in GitHub Actions (activation doesn't
      # persist across run: blocks).
      - name: Add venv to PATH
        run: |
          "${{ github.workspace }}\.venv\Scripts" |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # ── 3. App dependencies ──────────────────────────────────────────────
      - name: Install app dependencies
        run: pip install -e ".[messaging,cron,pty,mcp,acp]"

      # ── 4. Desktop build tools ───────────────────────────────────────────
      # cairosvg requires cairo.dll which isn't on the runner — make_icon.py
      # falls back to PIL automatically, so we don't install cairosvg here.
      - name: Install desktop build tools
        run: pip install pyinstaller pystray Pillow

      # ── 5. Generate icon ─────────────────────────────────────────────────
      - name: Generate logos.ico from SVG
        run: python launcher\make_icon.py

      # ── 6. PyInstaller ───────────────────────────────────────────────────
      - name: Build executable with PyInstaller
        run: pyinstaller launcher\hermes_launcher.spec --noconfirm

      # ── 7. Inno Setup ────────────────────────────────────────────────────
      - name: Build installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer\logos.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── 8. Upload artifact ───────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogosSetup-windows
          path: installer\output\LogosSetup-*.exe
          retention-days: 30

      # ── 9. Attach to the existing GitHub Release (tags only) ─────────────
      # GitHub auto-creates a release when a tag is pushed; this step
      # uploads the installer to that existing release.
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: installer\output\LogosSetup-*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
