name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'          # e.g. v0.4.0 → builds + attaches to GitHub Release
  workflow_dispatch:   # manual trigger from Actions tab (for testing)

# Only one build at a time — cancel any in-progress run for the same tag/ref
concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python + uv ──────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      # ── 3. App dependencies ──────────────────────────────────────────────
      # Install the package in a venv so PyInstaller can find all imports.
      # We skip heavy optional extras (rl, yc-bench, voice) that aren't
      # needed at runtime on a desktop install.
      - name: Install app dependencies
        run: |
          uv venv .venv --python 3.11
          .venv\Scripts\activate
          uv pip install -e ".[messaging,cron,pty,mcp,acp]"

      # ── 4. Desktop-only deps ─────────────────────────────────────────────
      - name: Install desktop build tools
        run: |
          .venv\Scripts\activate
          pip install pyinstaller pystray Pillow cairosvg

      # ── 5. Generate icon ─────────────────────────────────────────────────
      - name: Generate logos.ico from SVG
        run: |
          .venv\Scripts\activate
          python launcher\make_icon.py

      # ── 6. PyInstaller ───────────────────────────────────────────────────
      - name: Build executable with PyInstaller
        run: |
          .venv\Scripts\activate
          pyinstaller launcher\hermes_launcher.spec --noconfirm

      # ── 7. Inno Setup ────────────────────────────────────────────────────
      # windows-latest ships Inno Setup 6 at the path below.
      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\logos.iss
        shell: pwsh

      # ── 8. Upload artifact (always — even on workflow_dispatch) ──────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogosSetup-windows
          path: installer\output\LogosSetup-*.exe
          retention-days: 30

      # ── 9. Attach to GitHub Release (tags only) ──────────────────────────
      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\output\LogosSetup-*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
