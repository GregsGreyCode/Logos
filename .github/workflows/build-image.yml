name: Build Container Image

on:
  push:
    tags:
      - 'v*'          # e.g. v0.4.7 (stable) or v0.4.7-rc.1 (canary pre-release)
  workflow_dispatch:   # manual trigger from Actions tab (for testing)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write     # required to push to ghcr.io

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Detect release channel ─────────────────────────────────────────
      # Pre-release tags (vX.Y.Z-rc.N) go to :canary only.
      # Stable tags (vX.Y.Z) go to :vX.Y.Z + :latest and also update :canary.
      - name: Detect release channel
        id: channel
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-rc"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. Registry auth ─────────────────────────────────────────────────
      # Log in to Docker Hub first so buildx can pull moby/buildkit without
      # hitting the unauthenticated pull rate limit on the shared runner IP.
      - name: Log in to Docker Hub (buildx image pull)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ── 4a. Build metadata — pre-release (canary only) ───────────────────
      # Pre-release: push :canary only. No :latest, no versioned stable tag.
      - name: Extract Docker metadata (pre-release)
        id: meta_pre
        if: steps.channel.outputs.is_prerelease == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gregsgreycode/logos
          tags: |
            type=raw,value=canary

      # ── 4b. Build metadata — stable release ──────────────────────────────
      # Stable: push :vX.Y.Z, :latest, and also update :canary so the canary
      # deployment automatically picks up the validated stable image.
      - name: Extract Docker metadata (stable)
        id: meta_stable
        if: steps.channel.outputs.is_prerelease == 'false'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gregsgreycode/logos
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
            type=raw,value=canary

      # ── 5. Buildx ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Build + push ──────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.channel.outputs.is_prerelease == 'true' && steps.meta_pre.outputs.tags || steps.meta_stable.outputs.tags }}
          labels: ${{ steps.channel.outputs.is_prerelease == 'true' && steps.meta_pre.outputs.labels || steps.meta_stable.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          # Layer cache: reuse layers from the previous push to canary
          cache-from: type=registry,ref=ghcr.io/gregsgreycode/logos:canary
          cache-to: type=inline
