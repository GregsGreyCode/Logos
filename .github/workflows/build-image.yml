name: Build Container Image

on:
  push:
    tags:
      - 'v*'          # e.g. v0.4.7 → builds + pushes to ghcr.io
  workflow_dispatch:   # manual trigger from Actions tab (for testing)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write     # required to push to ghcr.io

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Registry auth ─────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ── 3. Build metadata (tags + labels) ────────────────────────────────
      # Produces three tags:
      #   ghcr.io/gregsgreycode/logos:canary      — mutable, what k8s manifests pull
      #   ghcr.io/gregsgreycode/logos:latest      — mutable, latest release
      #   ghcr.io/gregsgreycode/logos:v0.4.7      — immutable, for rollback pinning
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gregsgreycode/logos
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=canary
            type=raw,value=latest

      # ── 4. Buildx ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build + push ──────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          # Layer cache: reuse layers from the previous push to canary
          cache-from: type=registry,ref=ghcr.io/gregsgreycode/logos:canary
          cache-to: type=inline
