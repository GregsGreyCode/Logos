# Canary deployment for testing new Hermes images before promoting to stable.
#
# Workflow:
#   1. Build new image: docker build → push as ghcr.io/your-org/logos:canary
#   2. kubectl apply -f 10-logos-canary-deployment.yaml
#   3. kubectl rollout status deployment/logos-canary -n logos --timeout=120s
#   4. Smoke test: kubectl exec or curl http://logos-canary.logos.svc.cluster.local/health
#   5a. PROMOTE: update image tag in 06-deployment.yaml → kubectl apply → kubectl rollout restart
#   5b. ROLLBACK: kubectl delete -f 10-logos-canary-deployment.yaml
#
# Telegram is intentionally disabled — only the prod deployment handles Telegram.
# This file is meant to be applied temporarily and then deleted.
# Do not leave it running alongside stable indefinitely.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logos-canary
  namespace: logos
  labels:
    app: logos-canary
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: logos-canary
  template:
    metadata:
      labels:
        app: logos-canary
        canary: "true"
    spec:
      serviceAccountName: logos

      imagePullSecrets:
        - name: ghcr-creds

      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      volumes:
        # emptyDir — canary gets a fresh home, doesn't share PVC with stable
        - name: logos-home
          emptyDir: {}
        - name: logos-config-seed
          configMap:
            name: logos-config-yaml

      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 10001

      initContainers:
        - name: seed-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /logos-home/memories
              cp /seed/config.yaml /logos-home/config.yaml
              cp /seed/SOUL.md /logos-home/SOUL.md
              echo "canary: config.yaml and SOUL.md seeded"
          volumeMounts:
            - name: logos-home
              mountPath: /logos-home
            - name: logos-config-seed
              mountPath: /seed
              readOnly: true
          securityContext:
            runAsUser: 10001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      containers:
        - name: logos
          image: ghcr.io/gregsgreycode/logos:canary
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080

          env:
            - name: HOME
              value: /home/hermes
            - name: HERMES_HOME
              value: /home/hermes/.hermes
            # Inject node LAN IP so the setup wizard's network scan uses the
            # correct /24 subnet rather than the pod's CNI address.
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: HERMES_IS_CANARY
              value: "true"
            - name: HERMES_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: logos-config
                  key: HERMES_LOG_LEVEL
            - name: HERMES_PORT
              valueFrom:
                configMapKeyRef:
                  name: logos-config
                  key: HERMES_PORT
            - name: REQUEST_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: logos-config
                  key: REQUEST_TIMEOUT_SECONDS
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: logos-config
                  key: OPENAI_BASE_URL
            - name: HERMES_MODEL
              valueFrom:
                configMapKeyRef:
                  name: logos-config
                  key: HERMES_MODEL
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: logos-config
                  key: LLM_MODEL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: logos-secret
                  key: OPENAI_API_KEY
            - name: HERMES_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: logos-secret
                  key: HERMES_INTERNAL_TOKEN
            - name: HERMES_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: logos-secret
                  key: HERMES_JWT_SECRET
            # Canary-only admin credentials — from hermes-canary-admin secret (12-hermes-canary-admin-secret.yaml)
            # Kept separate so canary has known/documented login credentials independent of stable.
            - name: HERMES_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: logos-canary-admin
                  key: HERMES_ADMIN_EMAIL
            - name: HERMES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logos-canary-admin
                  key: HERMES_ADMIN_PASSWORD
            - name: HERMES_ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: logos-canary-admin
                  key: HERMES_ADMIN_NAME

          volumeMounts:
            - name: logos-home
              mountPath: /home/hermes/.hermes

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
