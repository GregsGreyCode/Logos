# ⚠️  NEVER COMMIT THIS FILE WITH REAL VALUES.
# This template contains placeholder strings (REPLACE_WITH_*).
# Fill in real values locally, apply with `kubectl apply -f`, then revert.
# Consider using Sealed Secrets or SOPS for production deployments.
# Add this file to .gitignore if you store credentials locally.
#
# HERMES_JWT_SECRET is intentionally omitted — Logos auto-generates a secure
# random secret on first boot and persists it to the PVC (~/.logos/.jwt_secret).
# You may set it here to override (e.g. to keep sessions valid across PVC wipes).
apiVersion: v1
kind: Secret
metadata:
  name: logos-secret
  namespace: logos
type: Opaque
stringData:
  OPENAI_API_KEY: "local"
  HERMES_INTERNAL_TOKEN: "local"
  INSPECTOR_TOKEN: "REPLACE_WITH_INSPECTOR_TOKEN"
  # Admin bootstrap credentials — only used if no admin account exists yet.
  # The setup wizard creates the real admin; these can be left as placeholders
  # unless you need to re-seed after a full DB wipe.
  HERMES_ADMIN_EMAIL: "REPLACE_WITH_ADMIN_EMAIL"
  HERMES_ADMIN_PASSWORD: "REPLACE_WITH_ADMIN_PASSWORD"
  HERMES_ADMIN_NAME: "REPLACE_WITH_ADMIN_NAME"
  # lgtm-mcp bearer token — must match MCP_CLIENT_TOKEN in lgtm-mcp/.env
  # Generate with: openssl rand -hex 32
  LGTM_MCP_TOKEN: "REPLACE_WITH_LGTM_MCP_TOKEN"
  # ssh-mcp bearer token — must match MCP_CLIENT_TOKEN in ssh-mcp/.env
  # Generate with: openssl rand -hex 32
  SSH_MCP_TOKEN: "REPLACE_WITH_SSH_MCP_TOKEN"
