apiVersion: v1
kind: ConfigMap
metadata:
  name: logos-config
  namespace: logos-dev
data:
  HERMES_LOG_LEVEL: "info"
  HERMES_PORT: "8080"
  REQUEST_TIMEOUT_SECONDS: "120"
  OPENAI_BASE_URL: "http://ai-router.hermes.svc.cluster.local:9001/v1"
  HERMES_MODEL: "qwen/qwen3.5-9b"
  LLM_MODEL: "balanced"
  HERMES_RUNTIME_MODE: "kubernetes"
  # Wipe setup state on every pod start so the setup wizard always runs fresh.
  # Useful during active development. Set to "false" to preserve state across restarts.
  HERMES_WIPE_ON_START: "true"
