# NetworkPolicy: restrict ingress/egress for logos pods.
#
# Ingress:  only allow traffic to the gateway HTTP port (8080) from within
#           the cluster (e.g. the ingress controller or other pods).
# Egress:   allow DNS (UDP/TCP 53), HTTPS to external APIs (443), and
#           internal cluster traffic.  Deny everything else.
#
# Apply after verifying your ingress controller namespace label matches
# the namespaceSelector below.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: logos-gateway
  namespace: logos
spec:
  podSelector:
    matchLabels:
      app: logos
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow HTTP traffic to the gateway port from anywhere in the cluster.
    - ports:
        - protocol: TCP
          port: 8080

  egress:
    # DNS resolution (required for all outbound calls)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # HTTPS to external APIs (Telegram, OpenAI, Anthropic, Discord, etc.)
    - ports:
        - protocol: TCP
          port: 443

    # HTTP — needed for local inference backends (Ollama, LM Studio)
    - ports:
        - protocol: TCP
          port: 80

    # Common local inference ports — needed for machine setup probes and health checks
    # (Ollama: 11434, LM Studio: 1234, vLLM: 8000)
    - ports:
        - protocol: TCP
          port: 1234
        - protocol: TCP
          port: 11434
        - protocol: TCP
          port: 8000

    # Internal cluster traffic to ai-router service (port 8080)
    - to:
        - podSelector:
            matchLabels:
              app: ai-router
      ports:
        - protocol: TCP
          port: 8080

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: logos-ai-router
  namespace: logos
spec:
  podSelector:
    matchLabels:
      app: ai-router
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Only accept routing requests from logos gateway pods
    - from:
        - podSelector:
            matchLabels:
              app: logos
      ports:
        - protocol: TCP
          port: 8080

  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # HTTPS to model backends and external inference APIs
    - ports:
        - protocol: TCP
          port: 443

    # HTTP for local inference backends
    - ports:
        - protocol: TCP
          port: 80

    # Common local inference ports (Ollama: 11434, LM Studio: 1234, vLLM: 8000)
    - ports:
        - protocol: TCP
          port: 11434
        - protocol: TCP
          port: 1234
        - protocol: TCP
          port: 8000
