# Service for hermes-canary.
# NodePort 30903 → external access at http://<node-ip>:30903
# ClusterIP also available at http://hermes-canary.hermes.svc.cluster.local
# so the stable Hermes can smoke-test it in-cluster.
#
# Apply and delete alongside 10-hermes-canary-deployment.yaml.
apiVersion: v1
kind: Service
metadata:
  name: hermes-canary
  namespace: hermes
spec:
  selector:
    app: hermes-canary
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30903
  type: NodePort
