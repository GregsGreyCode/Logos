# Service for logos-canary.
# NodePort 30903 → external access at http://<node-ip>:30903
# ClusterIP also available at http://logos-canary.logos.svc.cluster.local
# so the stable Hermes can smoke-test it in-cluster.
#
# Apply and delete alongside 10-logos-canary-deployment.yaml.
apiVersion: v1
kind: Service
metadata:
  name: logos-canary
  namespace: logos
spec:
  selector:
    app: logos-canary
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30903
  type: NodePort
