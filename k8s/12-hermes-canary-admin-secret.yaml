apiVersion: v1
kind: Secret
metadata:
  name: hermes-canary-admin
  namespace: hermes
type: Opaque
stringData:
  # Canary-only admin credentials — separate from the stable instance.
  # These seed the fresh emptyDir auth.db on every canary pod start.
  # Change HERMES_ADMIN_PASSWORD to something memorable before applying.
  HERMES_ADMIN_EMAIL: "admin@hermes-canary"
  HERMES_ADMIN_PASSWORD: "REPLACE_WITH_CANARY_ADMIN_PASSWORD"
  HERMES_ADMIN_NAME: "Canary Admin"
