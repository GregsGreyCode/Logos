apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-shared-memory-pvc
  namespace: hermes
  annotations:
    hermes.io/purpose: "Shared read-only memory for spawned instances. Primary instances
      write here; spawned instances mount this read-only so they can see the primary's
      MEMORY.md and USER.md without modifying them."
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
