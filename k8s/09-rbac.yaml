# Namespace-scoped Role: manage Hermes instances (deployments, services, pvcs, pods, jobs)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: logos-instance-manager
  namespace: logos
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Jobs — required for k8s exec mode (agent tasks run as batch Jobs)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: logos-instance-manager
  namespace: logos
subjects:
  - kind: ServiceAccount
    name: logos
    namespace: logos
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: logos-instance-manager
---
# Same Role in the hermes namespace — agent instances (deployments, jobs, pods)
# run here, so the logos SA needs identical permissions in both namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: logos-instance-manager
  namespace: hermes
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: logos-instance-manager
  namespace: hermes
subjects:
  - kind: ServiceAccount
    name: logos
    namespace: logos
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: logos-instance-manager
---
# Cluster-scoped read: list nodes (capacity) and pods cluster-wide (usage)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: logos-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logos-cluster-reader
subjects:
  - kind: ServiceAccount
    name: logos
    namespace: logos
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: logos-cluster-reader
