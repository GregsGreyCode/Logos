# Namespace-scoped Role: manage Hermes instances (deployments, services, pvcs, pods)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: logos-instance-manager
  namespace: logos
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: logos-instance-manager
  namespace: logos
subjects:
  - kind: ServiceAccount
    name: logos
    namespace: logos
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: logos-instance-manager
---
# Cluster-scoped read: list nodes (capacity) and pods cluster-wide (usage)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: logos-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logos-cluster-reader
subjects:
  - kind: ServiceAccount
    name: logos
    namespace: logos
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: logos-cluster-reader
