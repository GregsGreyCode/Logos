    <script>
    function app() {
      return {
        tab: 'providers',
        state: { providers: {}, routes: {}, grafana_url: '', health_checked_at: '' },
        chatMessages: [],
        chatInput: '',
        chatLoading: false,
        chatSessionId: 'admin-' + Math.random().toString(36).slice(2,8),
    
        async init() {
          await this.loadState();
          setInterval(() => this.loadState(), 30000);
        },
    
        async loadState() {
          try {
            const r = await fetch('/admin/state');
            this.state = await r.json();
          } catch(e) { console.error('loadState failed', e); }
        },
    
        async toggleProvider(key) {
          try {
            const r = await fetch('/admin/providers/'+key+'/toggle', {method:'POST'});
            const d = await r.json();
            if (this.state.providers[key]) this.state.providers[key].enabled = d.enabled;
          } catch(e) { alert('Toggle failed: '+e); }
        },
    
        async sendChat() {
          const msg = this.chatInput.trim();
          if (!msg || this.chatLoading) return;
          this.chatInput = '';
          this.chatMessages.push({role:'user', content: msg});
          this.chatLoading = true;
          this.scrollChat();
          try {
            const r = await fetch('/admin/chat', {
              method: 'POST',
              headers: {'Content-Type':'application/json'},
              body: JSON.stringify({message: msg, session_id: this.chatSessionId, user_name: 'Admin'})
            });
            const reader = r.body.getReader();
            const dec = new TextDecoder();
            let buf = '';
            let reply = '';
            while(true) {
              const {done, value} = await reader.read();
              if(done) break;
              buf += dec.decode(value, {stream:true});
              const lines = buf.split('\\n');
              buf = lines.pop();
              for(const line of lines) {
                if(!line.startsWith('data:')) continue;
                try {
                  const d = JSON.parse(line.slice(5).trim());
                  if(d.type==='message') reply = d.content;
                  if(d.type==='done' && reply) {
                    this.chatMessages.push({role:'assistant', content: reply});
                    reply = '';
                  }
                  if(d.type==='error') {
                    this.chatMessages.push({role:'assistant', content: '❌ '+d.content});
                  }
                } catch(_){}
              }
            }
          } catch(e) {
            this.chatMessages.push({role:'assistant', content: '❌ Connection error: '+e});
          } finally {
            this.chatLoading = false;
            this.scrollChat();
          }
        },
    
        scrollChat() {
          this.$nextTick(() => {
            const el = document.getElementById('chat-messages');
            if(el) el.scrollTop = el.scrollHeight;
          });
        }
      }
    }
    </script>
    </body>
